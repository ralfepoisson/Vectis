name: Release Images

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}
      STAGE: prod
      STACK_PREFIX: ${{ vars.STACK_PREFIX || 'vectis' }}
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || 'vectis-sense.ai' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - run: npm ci
      - run: npm test
      - run: python -m pip install -e ./src/agent[dev]
      - run: pytest src/agent/tests
      - run: ./cicd/serverless/scripts/build-and-push-images.sh

  deploy-prod:
    needs: release
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}
      STAGE: prod
      STACK_PREFIX: ${{ vars.STACK_PREFIX || 'vectis' }}
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || 'vectis-sense.ai' }}
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
      IMAGE_TAG: ${{ github.sha }}
      SKIP_IMAGE_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - run: ./cicd/serverless/scripts/deploy-prod.sh
