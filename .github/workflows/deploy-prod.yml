name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag to deploy. Defaults to the current commit SHA.
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}
      STAGE: prod
      STACK_PREFIX: ${{ vars.STACK_PREFIX || 'vectis' }}
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || 'vectis-sense.ai' }}
      HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
      ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - run: ./cicd/serverless/scripts/deploy-prod.sh
