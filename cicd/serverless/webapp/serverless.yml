service: vectis-webapp-service
frameworkVersion: "4"

provider:
  name: aws
  region: ${opt:region, env:AWS_REGION, 'eu-west-3'}
  stage: ${opt:stage, 'prod'}
  stackName: ${param:stackPrefix}-${sls:stage}-webapp

params:
  default:
    stackPrefix: vectis
    rootDomain: vectis-sense.ai
    imageUri: ""
    desiredCount: 1

resources:
  Resources:
    WebappLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /ecs/${param:stackPrefix}/${sls:stage}/webapp
        RetentionInDays: 14

    WebappExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Statement:
            - Action: sts:AssumeRole
              Effect: Allow
              Principal:
                Service: ecs-tasks.amazonaws.com
          Version: "2012-10-17"
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

    WebappTargetGroup:
      Type: AWS::ElasticLoadBalancingV2::TargetGroup
      Properties:
        HealthCheckPath: /
        HealthCheckProtocol: HTTP
        Matcher:
          HttpCode: 200-399
        Port: 80
        Protocol: HTTP
        TargetType: ip
        VpcId:
          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-VpcId

    WebappListenerRule:
      Type: AWS::ElasticLoadBalancingV2::ListenerRule
      Properties:
        Actions:
          - TargetGroupArn:
              Ref: WebappTargetGroup
            Type: forward
        Conditions:
          - Field: host-header
            HostHeaderConfig:
              Values:
                - app.${param:rootDomain}
        ListenerArn:
          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-HttpsListenerArn
        Priority: 200

    WebappDnsRecord:
      Type: AWS::Route53::RecordSet
      Properties:
        AliasTarget:
          DNSName:
            Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-AlbDnsName
          HostedZoneId:
            Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-AlbCanonicalHostedZoneId
        HostedZoneId: ${param:hostedZoneId}
        Name: app.${param:rootDomain}
        Type: A

    WebappTaskDefinition:
      Type: AWS::ECS::TaskDefinition
      Properties:
        Cpu: "256"
        ExecutionRoleArn:
          Fn::GetAtt:
            - WebappExecutionRole
            - Arn
        Family: ${param:stackPrefix}-${sls:stage}-webapp
        Memory: "512"
        NetworkMode: awsvpc
        RequiresCompatibilities:
          - FARGATE
        ContainerDefinitions:
          - Name: webapp
            Image: ${param:imageUri}
            Essential: true
            PortMappings:
              - ContainerPort: 80
                Protocol: tcp
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group:
                  Ref: WebappLogGroup
                awslogs-region: ${aws:region}
                awslogs-stream-prefix: ecs

    WebappService:
      Type: AWS::ECS::Service
      DependsOn:
        - WebappListenerRule
      Properties:
        Cluster:
          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-ClusterArn
        DeploymentConfiguration:
          MaximumPercent: 200
          MinimumHealthyPercent: 50
        DesiredCount: ${param:desiredCount}
        HealthCheckGracePeriodSeconds: 30
        LaunchType: FARGATE
        LoadBalancers:
          - ContainerName: webapp
            ContainerPort: 80
            TargetGroupArn:
              Ref: WebappTargetGroup
        NetworkConfiguration:
          AwsvpcConfiguration:
            AssignPublicIp: ENABLED
            SecurityGroups:
              - Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-EcsServiceSecurityGroupId
            Subnets:
              - Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-PublicSubnetAId
              - Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-PublicSubnetBId
        PlatformVersion: LATEST
        TaskDefinition:
          Ref: WebappTaskDefinition
