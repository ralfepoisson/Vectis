service: vectis-backend-service
frameworkVersion: "4"

provider:
  name: aws
  region: ${opt:region, env:AWS_REGION, 'eu-west-3'}
  stage: ${opt:stage, 'prod'}
  stackName: ${param:stackPrefix}-${sls:stage}-backend

params:
  default:
    stackPrefix: vectis
    foundationStack: vectis-prod-foundation
    rootDomain: vectis-sense.ai
    imageUri: ""
    desiredCount: 1
    databaseName: vectis_prod

resources:
  Resources:
    BackendLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /ecs/${param:stackPrefix}/${sls:stage}/backend
        RetentionInDays: 14

    BackendExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Statement:
            - Action: sts:AssumeRole
              Effect: Allow
              Principal:
                Service: ecs-tasks.amazonaws.com
          Version: "2012-10-17"
        ManagedPolicyArns:
          - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

    BackendTaskRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Statement:
            - Action: sts:AssumeRole
              Effect: Allow
              Principal:
                Service: ecs-tasks.amazonaws.com
          Version: "2012-10-17"
        Policies:
          - PolicyName: backend-s3-access
            PolicyDocument:
              Statement:
                - Action:
                    - s3:GetObject
                    - s3:PutObject
                  Effect: Allow
                  Resource:
                    Fn::Sub:
                      - arn:aws:s3:::${BucketName}/*
                      - BucketName:
                          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-ImageBucketName
                - Action:
                    - s3:ListBucket
                  Effect: Allow
                  Resource:
                    Fn::Sub:
                      - arn:aws:s3:::${BucketName}
                      - BucketName:
                          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-ImageBucketName
              Version: "2012-10-17"

    BackendTargetGroup:
      Type: AWS::ElasticLoadBalancingV2::TargetGroup
      Properties:
        HealthCheckPath: /health
        HealthCheckProtocol: HTTP
        Matcher:
          HttpCode: 200-399
        Port: 3000
        Protocol: HTTP
        TargetType: ip
        VpcId:
          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-VpcId

    BackendListenerRule:
      Type: AWS::ElasticLoadBalancingV2::ListenerRule
      Properties:
        Actions:
          - TargetGroupArn:
              Ref: BackendTargetGroup
            Type: forward
        Conditions:
          - Field: host-header
            HostHeaderConfig:
              Values:
                - api.${param:rootDomain}
        ListenerArn:
          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-HttpsListenerArn
        Priority: 300

    BackendDnsRecord:
      Type: AWS::Route53::RecordSet
      Properties:
        AliasTarget:
          DNSName:
            Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-AlbDnsName
          HostedZoneId:
            Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-AlbCanonicalHostedZoneId
        HostedZoneId: ${param:hostedZoneId}
        Name: api.${param:rootDomain}
        Type: A

    BackendTaskDefinition:
      Type: AWS::ECS::TaskDefinition
      Properties:
        Cpu: "512"
        ExecutionRoleArn:
          Fn::GetAtt:
            - BackendExecutionRole
            - Arn
        Family: ${param:stackPrefix}-${sls:stage}-backend
        Memory: "1024"
        NetworkMode: awsvpc
        RequiresCompatibilities:
          - FARGATE
        TaskRoleArn:
          Fn::GetAtt:
            - BackendTaskRole
            - Arn
        ContainerDefinitions:
          - Name: backend
            Image: ${param:imageUri}
            Essential: true
            PortMappings:
              - ContainerPort: 3000
                Protocol: tcp
            Environment:
              - Name: HOST
                Value: 0.0.0.0
              - Name: PORT
                Value: "3000"
              - Name: NODE_ENV
                Value: production
              - Name: FRAME_STORAGE_DRIVER
                Value: s3
              - Name: FRAME_STORAGE_S3_BUCKET
                Value:
                  Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-ImageBucketName
              - Name: FRAME_STORAGE_S3_PREFIX
                Value: raw
              - Name: DATABASE_HOST
                Value:
                  Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-DatabaseEndpointAddress
              - Name: DATABASE_PORT
                Value:
                  Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-DatabaseEndpointPort
              - Name: DATABASE_NAME
                Value: ${param:databaseName}
            Secrets:
              - Name: DATABASE_USERNAME
                ValueFrom:
                  Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-DatabaseUsernameSecretArn
              - Name: DATABASE_PASSWORD
                ValueFrom:
                  Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-DatabasePasswordSecretArn
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group:
                  Ref: BackendLogGroup
                awslogs-region: ${aws:region}
                awslogs-stream-prefix: ecs

    BackendService:
      Type: AWS::ECS::Service
      DependsOn:
        - BackendListenerRule
      Properties:
        Cluster:
          Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-ClusterArn
        DeploymentConfiguration:
          MaximumPercent: 200
          MinimumHealthyPercent: 50
        DesiredCount: ${param:desiredCount}
        HealthCheckGracePeriodSeconds: 60
        LaunchType: FARGATE
        LoadBalancers:
          - ContainerName: backend
            ContainerPort: 3000
            TargetGroupArn:
              Ref: BackendTargetGroup
        NetworkConfiguration:
          AwsvpcConfiguration:
            AssignPublicIp: ENABLED
            SecurityGroups:
              - Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-EcsServiceSecurityGroupId
            Subnets:
              - Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-PublicSubnetAId
              - Fn::ImportValue: ${param:stackPrefix}-${sls:stage}-PublicSubnetBId
        PlatformVersion: LATEST
        TaskDefinition:
          Ref: BackendTaskDefinition
